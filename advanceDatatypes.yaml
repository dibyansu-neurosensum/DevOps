# reusing some properties
likings: 
 fav fruit: mango
 dislikes: grapes

person1:
 name: kunal
 fav fruit: mango
 dislikes: grapes

person2:
 name: rahul
 fav fruit: mango
 dislikes: grapes

 # reusing some properties using anchors
likings: &likes
 fav fruit: mango
 dislikes: grapes

person1:
 name: kunal
 <<: *likes

person2:
 name: rahul
 <<: *likes