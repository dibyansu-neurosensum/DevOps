student: !!seq
 - marks
 - name
 - roll_no

cities: [new delhi, mumbai]

# some of the keys of the seq will be empty
# sparese seq 
sparese seq:
 - hey
 - how
 -
 - Null
 - sup


# nested sequence
-
 - mango
 - apple
 - banana
-
 - null

# output
# [
#   [
#     "mango",
#     "apple",
#     "banana"
#   ],
#   [
#     null
#   ]
# ]




# key: value pairs are called maps
!!map

# nested mapping: map within an map 
name: DKD 
role:
  age: 79
  job: student

# output
# {
#   "name": "DKD",
#   "role": {
#     "age": 79,
#     "job": "student"
#   }
# }

# some as 
name: DKD
role: {age: 79,job: student}






# pairs: keys may have duplicate values
# !!pairs

pair example: !!pairs  
 - job: student
 - job: teacher

#  output
# {
#   "pair example": [
#     [
#       "job",
#       "student"
#     ],
#     [
#       "job",
#       "teacher"
#     ]
#   ]
# }
# some as 
pair example: !!pairs [job: student, job: teacher]






# !!set will allow you to have unique values
names: !!set
 ? kunal
 ? apporv
 ? rahul

  # dictionary  !!omap
people: !!omap
 - kunal:
    name: kunal
    age: 79
    height: 678
 - rahul:
